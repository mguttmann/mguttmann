# Top-languages card for the special profile repo `mguttmann/mguttmann`.
#
# Generates an HONEST "most used languages" SVG by aggregating the language
# BYTES GitHub reports across the owner's OWN repositories — public AND private,
# with FORKS EXCLUDED — and pushes the result to the shared `output` branch. The
# profile README embeds it from there via:
#
#   https://raw.githubusercontent.com/mguttmann/mguttmann/output/top-languages.svg
#
# WHY a custom, env-isolated token (and not the built-in GITHUB_TOKEN):
#   The built-in GITHUB_TOKEN can only read THIS repository, so it cannot see the
#   owner's other (especially PRIVATE) repos. To reflect real language usage we
#   need a token that can read the owner's repositories. That token is stored as
#   the environment secret `STATS_TOKEN` in the `stats` environment.
#
# SECURITY MODEL (deliberate, least-privilege):
#   1. ONLY the `render` job declares `environment: stats`. Per the GitHub docs,
#      environment secrets "are only available to workflow jobs that use the
#      environment"
#      (https://docs.github.com/en/actions/how-tos/deploy/configure-and-manage-deployments/manage-environments),
#      so STATS_TOKEN is scoped to this single job and is invisible to every
#      other workflow/job in the repo (snake, 3d-contrib, summary-cards,
#      featured-from-pins, metrics) — none of which reference it.
#   2. STATS_TOKEN is handed ONLY to the self-written render step
#      (`.github/scripts/lang_card.py`, Python stdlib, no third-party package).
#      It is NEVER passed to a third-party Action via `with: token:`.
#   3. The token is never echoed/logged. The script reads it from `os.environ`
#      and never prints it; the generated SVG contains aggregate stats only and
#      no token. The push step does NOT receive STATS_TOKEN.
#   4. Gating: a job-level `HAS_STATS_TOKEN` flag holds `secrets.STATS_TOKEN
#      != ''` as a boolean string (the `secrets` context is not allowed in a
#      step-level `if:`, and only the boolean — never the token value — is put
#      into job env). Both the render and push steps run only
#      `if: env.HAS_STATS_TOKEN == 'true'`. If the secret is later removed, both
#      steps are SKIPPED (clean no-op) — no crash and no broken/empty card
#      committed.
#
# Action references pinned to currently maintained refs (verified June 2026):
#   - actions/setup-python@v5
#   - crazy-max/ghaction-github-pages@v5 (latest v5.0.0, Mar 2026) — identical to
#     the snake / summary-cards / 3d-contrib workflows, with keep_history: true so
#     the co-existing assets on `output` (snake, 3d-contrib, summary cards,
#     pins.json) are PRESERVED, never force-deleted.
name: Generate Top Languages Card

on:
  # Refresh once a day. Daily is plenty for a language breakdown and keeps
  # Actions-minute usage low.
  schedule:
    - cron: "30 4 * * *"

  # Allow manual runs from the Actions tab (used for the first run / debugging).
  workflow_dispatch:

  # Regenerate whenever the default branch is updated.
  push:
    branches:
      - main

# Least-privilege: the only mutation this workflow performs is pushing the
# generated SVG to the `output` branch, which requires write access to repo
# contents. Nothing else is granted.
permissions:
  contents: write

# Serialize overlapping runs (scheduled + push) that would race to push the same
# branch. We do NOT cancel in-progress runs, so a running generation is allowed
# to finish rather than being aborted by a quickly following trigger.
concurrency:
  group: lang-card
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # CRITICAL: declaring the environment is what scopes `STATS_TOKEN` to this
    # job only. Per the GitHub docs, environment secrets are available solely to
    # jobs that reference the environment.
    environment: stats

    # Gating flag. The `secrets` context cannot be used directly in a step-level
    # `if:`, so we evaluate the presence of the secret ONCE here into a boolean
    # string (NOT the token value — only `true`/`false`). Steps then gate on
    # `env.HAS_STATS_TOKEN`. If the secret is removed later, this is `'false'`
    # and both the render and push steps are skipped (clean no-op).
    env:
      HAS_STATS_TOKEN: ${{ secrets.STATS_TOKEN != '' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Generate the SVG into dist/top-languages.svg using the self-written
      # renderer. STATS_TOKEN is supplied ONLY to THIS step (step-level env),
      # never to any third-party Action. The step is gated on the secret being
      # present, so a removed secret yields a clean no-op skip instead of a
      # crash or a broken card.
      - name: Render top-languages card
        if: ${{ env.HAS_STATS_TOKEN == 'true' }}
        env:
          STATS_TOKEN: ${{ secrets.STATS_TOKEN }}
        run: python3 .github/scripts/lang_card.py

      # Push the generated SVG to the `output` branch. keep_history: true makes
      # crazy-max CLONE the existing `output` branch and commit additively, so
      # the snake, 3d-contrib, summary-card and pins.json assets already on that
      # branch are PRESERVED (the default force-push would delete them).
      # This step does NOT receive STATS_TOKEN — it uses only the built-in
      # GITHUB_TOKEN to push. It is gated on the same secret check so it is
      # skipped when no card was produced (no empty / broken commit).
      - name: Push card to the output branch
        if: ${{ env.HAS_STATS_TOKEN == 'true' }}
        uses: crazy-max/ghaction-github-pages@v5
        with:
          target_branch: output
          build_dir: dist
          keep_history: true
          allow_empty_commit: false
          commit_message: "chore: refresh top-languages card"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
