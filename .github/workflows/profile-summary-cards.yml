# GitHub Profile Summary Cards for the special profile repo `mguttmann/mguttmann`.
#
# Generates a set of summary cards (profile details, repos-per-language,
# most-commit-language, stats, productive-time) as COMMITTED SVGs and pushes
# them to the dedicated `output` branch (the same branch the snake animation
# uses, kept consistent across all self-updating assets). The profile README
# embeds the cards of the chosen theme from that branch via:
#
#   .../output/profile-summary-card-output/<THEME>/0-profile-details.svg
#   .../output/profile-summary-card-output/<THEME>/1-repos-per-language.svg
#   .../output/profile-summary-card-output/<THEME>/2-most-commit-language.svg
#   .../output/profile-summary-card-output/<THEME>/3-stats.svg
#   .../output/profile-summary-card-output/<THEME>/4-productive-time.svg
#
# (full prefix: https://raw.githubusercontent.com/mguttmann/mguttmann/output/...)
#
# Theme: the action generates ALL themes (one sub-folder per theme) on every
# run, so the README simply points at the chosen theme's sub-folder. We
# standardise on the dark, restrained `github_dark` theme as the closest match
# to the profile's dark/executive look. (`2077` is neon/playful and `nord_dark`
# is a viable alternative; `github_dark` is the most understated and
# enterprise-appropriate.) NOTE: a perfect copper/brand-accent match is NOT
# achievable via theme input alone — that would require self-forking the action
# and editing its theme palette. The standard `github_dark` theme is the
# recommended, low-maintenance choice.
#
# Auth: the built-in `GITHUB_TOKEN` is sufficient for a PUBLIC profile. The
# action reads `GITHUB_TOKEN` from the environment and uses it for the GraphQL
# contribution queries against the owner's PUBLIC data and for nothing that
# requires elevated scopes here (we push via a separate, fully-controlled step).
# The upstream README suggests a custom secret `SUMMARY_GITHUB_TOKEN` (a PAT) —
# that is ONLY required if you want PRIVATE contributions reflected in the
# cards or need higher API rate limits. For a public profile, no PAT is needed.
#
# Push method: we set `AUTO_PUSH: false` so the action only WRITES the SVGs into
# the workspace. We then push them ourselves with `crazy-max/ghaction-github-pages@v5`
# — identical to the snake workflow — for full control over branch, path and
# (critically) `keep_history: true`, so this workflow does NOT delete the snake
# or 3d-contrib assets that live on the same `output` branch.
#
# Action references pinned to the currently maintained refs (verified June 2026):
#   - vn7n24fzkq/github-profile-summary-cards@release (the maintained dist
#     branch the upstream docs recommend; latest tag is v0.7.0, May 2024.
#     Strict-pin alternative: @v0.7.0.)
#   - actions/checkout@v4
#   - crazy-max/ghaction-github-pages@v5 (latest v5.0.0, Mar 2026)
name: Generate Profile Summary Cards

on:
  # Refresh once a day in the early morning (UTC). Daily is plenty for summary
  # cards and keeps Actions-minute usage low.
  schedule:
    - cron: "0 5 * * *"

  # Allow manual runs from the Actions tab (useful for the first run / debugging).
  workflow_dispatch:

  # Regenerate whenever the default branch is updated.
  push:
    branches:
      - main

# Least-privilege: the only mutation this workflow performs is pushing the
# generated SVGs to the `output` branch, which requires write access to repo
# contents. Nothing else is granted.
permissions:
  contents: write

# Serialize overlapping runs (scheduled + push) that would race to push the same
# branch. We do NOT cancel in-progress runs, so a running generation is allowed
# to finish rather than being aborted by a quickly following trigger.
concurrency:
  group: profile-summary-cards
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Generate the summary cards into ./profile-summary-card-output/<theme>/...
      # AUTO_PUSH is false: this step only writes files; the push is handled by
      # the dedicated, controlled step below.
      - name: Generate summary cards
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}
          AUTO_PUSH: false
          # Europe/Berlin offset for the Productive-Time card. This is a STATIC
          # integer (the action takes no IANA tz / no DST handling): 2 = CEST
          # (summer). In winter (CET) the card is off by one hour. Acceptable for
          # an at-a-glance stat; set to 1 if you prefer winter-accurate.
          UTC_OFFSET: 2

      # Move the generated folder under a staging dir so that crazy-max copies
      # the *contents* of `staging/` to the branch root, preserving the
      # `profile-summary-card-output/` prefix. crazy-max deploys the CONTENTS of
      # build_dir to the branch root, so:
      #   staging/profile-summary-card-output/<theme>/<card>.svg
      # becomes
      #   output/profile-summary-card-output/<theme>/<card>.svg
      - name: Stage generated cards
        run: |
          mkdir -p staging
          mv profile-summary-card-output staging/

      # Push the staged cards to the `output` branch. keep_history: true makes
      # crazy-max CLONE the existing `output` branch and commit on top, so the
      # snake and 3d-contrib assets already on that branch are PRESERVED (a
      # force-push, the default, would delete them). allow_empty_commit: false
      # avoids history churn when nothing changed.
      - name: Push cards to the output branch
        uses: crazy-max/ghaction-github-pages@v5
        with:
          target_branch: output
          build_dir: staging
          keep_history: true
          allow_empty_commit: false
          commit_message: "chore: refresh profile summary cards"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
